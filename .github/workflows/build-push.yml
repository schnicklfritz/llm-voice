# .github/workflows/docker-build-push.yml

name: Build & Push Docker Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build & Push LLM Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.llm  # Adjust if your Dockerfile is named differently (e.g., Dockerfile.llm)
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/llm:main
          ${{ secrets.DOCKERHUB_USERNAME }}/llm:${{ github.sha }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        labels: |
          org.opencontainers.image.source=${{ github.repositoryUrl }}
          org.opencontainers.image.revision=${{ github.sha }}
        provenance: false  # Disable if causing issues

    - name: Build & Push Orchestrator Image (if exists)
      uses: docker/build-push-action@v6
      if: hashFiles('orchestrator/Dockerfile') != ''
      with:
        context: ./orchestrator
        file: ./Dockerfile.orchestrator
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/orchestrator:main
          ${{ secrets.DOCKERHUB_USERNAME }}/orchestrator:${{ github.sha }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        labels: |
          org.opencontainers.image.source=${{ github.repositoryUrl }}
          org.opencontainers.image.revision=${{ github.sha }}
        provenance: false
