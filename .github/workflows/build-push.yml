name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            schnicklbob/llm-voice:latest
            schnicklbob/llm-voice:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
```

**Two tags on every push:**
- `:latest` — what QuickPod always pulls
- `:abc1234` (git SHA) — lets you roll back to any specific commit if a build breaks something

**`cache-from/cache-to: type=gha`** — GitHub Actions layer cache. Second build onward only rebuilds changed layers. Since your apt install layer rarely changes, rebuilds will be fast.

**Repo structure it expects:**
```
your-repo/
├── .github/
│   └── workflows/
│       └── build-push.yml
├── Dockerfile
└── pull_model.sh
