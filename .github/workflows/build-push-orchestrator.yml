name: Build and Push Orchestrator Image

on:
  push:
    branches:
      - main
    paths:
      - 'orchestrator/**'
      - '.github/workflows/build-push-orchestrator.yml'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: true
          platforms: linux/amd64
          tags: |
            schnicklbob/llm-voice-orchestrator:latest
            schnicklbob/llm-voice-orchestrator:${{ github.sha }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator
