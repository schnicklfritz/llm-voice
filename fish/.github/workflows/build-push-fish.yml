name: Build and Push Fish Image

on:
  push:
    branches:
      - main
    paths:
      - 'fish/**'
      - '.github/workflows/build-push-fish.yml'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./fish
          push: true
          platforms: linux/amd64
          tags: |
            schnicklbob/llm-voice-fish:latest
            schnicklbob/llm-voice-fish:${{ github.sha }}
          cache-from: type=gha,scope=fish
          cache-to: type=gha,mode=max,scope=fish
```

