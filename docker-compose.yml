version: "3.8"

services:
  llm:
    image: ghcr.io/vllm-project/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL=TheBloke/dolphin-2.9.2-mixtral-8x7b-AWQ
      - HF_TOKEN=hf_your_token_here
    volumes:
      - llm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

  tts:
    image: fishaudio/fish-speech:latest-server-cuda  # OFFICIAL - no build
    ports:
      - "8080:8080"
    environment:
      - API_SERVER_NAME=0.0.0.0
      - COMPILE=1
    volumes:
      - ./checkpoints:/app/checkpoints  # Download models here first
      - ./references:/app/references
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orchestrator:
    build: ./orchestrator  # Only orchestrator builds
    ports:
      - "8002:8002"
    environment:
      - LLM_URL=http://llm:8000/v1
      - TTS_URL=http://tts:8080/v1/tts
    depends_on:
      - llm
      - tts

volumes:
  llm-cache:
